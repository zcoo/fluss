suite: imagePullSecrets
templates:
  - templates/sts-coordinator.yaml
  - templates/sts-tablet.yaml

tests:
  - it: should not set imagePullSecrets by default
    asserts:
      - isNull:
          path: spec.template.spec.imagePullSecrets
        template: templates/sts-coordinator.yaml
      - isNull:
          path: spec.template.spec.imagePullSecrets
        template: templates/sts-tablet.yaml

  - it: should set imagePullSecrets when a single secret is provided
    set:
      image.pullSecrets:
        - my-registry-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: my-registry-secret
        template: templates/sts-coordinator.yaml
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: my-registry-secret
        template: templates/sts-tablet.yaml

  - it: should set imagePullSecrets when multiple secrets are provided
    set:
      image.pullSecrets:
        - secret-one
        - secret-two
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: secret-one
            - name: secret-two
        template: templates/sts-coordinator.yaml
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: secret-one
            - name: secret-two
        template: templates/sts-tablet.yaml
