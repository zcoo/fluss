suite: resources
templates:
  - templates/sts-coordinator.yaml
  - templates/sts-tablet.yaml

tests:
  - it: should not set resources by default
    asserts:
      - isEmpty:
          path: spec.template.spec.containers[0].resources
        template: templates/sts-coordinator.yaml
      - isEmpty:
          path: spec.template.spec.containers[0].resources
        template: templates/sts-tablet.yaml

  - it: should set correct resources for coordinator server
    set:
      resources:
        coordinatorServer:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        template: templates/sts-coordinator.yaml

  - it: should set correct resources for tablet server
    set:
      resources:
        tabletServer:
          requests:
            cpu: 300m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
        template: templates/sts-tablet.yaml

  - it: should set different resources for coordinator and tablet server
    set:
      resources:
        coordinatorServer:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        tabletServer:
          requests:
            cpu: 500m
            memory: 1024Mi
          limits:
            cpu: 1000m
            memory: 2048Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        template: templates/sts-coordinator.yaml
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            requests:
              cpu: 500m
              memory: 1024Mi
            limits:
              cpu: 1000m
              memory: 2048Mi
        template: templates/sts-tablet.yaml
