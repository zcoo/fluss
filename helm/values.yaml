# Default values for fluss.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  registry: ""
  repository: apache/fluss
  tag: "0.10.0-incubating"
  pullPolicy: IfNotPresent
  pullSecrets: []

coordinatorServer:
  replicas: 1
  livenessProbe:
    failureThreshold: 100
    timeoutSeconds: 1
    initialDelaySeconds: 10
    periodSeconds: 3
  readinessProbe:
    failureThreshold: 100
    timeoutSeconds: 1
    initialDelaySeconds: 10
    periodSeconds: 3

tabletServer:
  replicas: 3
  livenessProbe:
    failureThreshold: 100
    timeoutSeconds: 1
    initialDelaySeconds: 10
    periodSeconds: 3
  readinessProbe:
    failureThreshold: 100
    timeoutSeconds: 1
    initialDelaySeconds: 10
    periodSeconds: 3

# Fluss server configuration options
configurationOverrides:
  default.bucket.number: 3
  default.replication.factor: 3
  zookeeper.path.root: /fluss
  zookeeper.address: zk-zookeeper.{{ .Release.Namespace }}.svc.cluster.local:2181
  remote.data.dir: /tmp/fluss/remote-data
  data.dir: /tmp/fluss/data
  internal.listener.name: INTERNAL

tablet:
  storage:
    enabled: false
    size: 1Gi
    storageClass:

coordinator:
  storage:
    enabled: false
    size: 1Gi
    storageClass:

# Fluss listener configurations
listeners:
  internal:
    port: 9123
  client:
    port: 9124

resources:
  coordinatorServer: {}
  #   limits:
  #     cpu: 100m
  #     memory: 128Mi
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi
  tabletServer: {}
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi
  #   limits:
  #     cpu: 100m
  #     memory: 128Mi

serviceAccount:
  create: false
  # If not set and create is true, a name is generated using the fullname template
  name: ""
  # Additional annotations to apply to the ServiceAccount.
  # These can be useful, for example, to support integrations like workload identity.
  annotations: {}
